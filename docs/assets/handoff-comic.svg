<svg viewBox="0 0 960 460" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Comic: an exhausted agent session at 99% context hands a baton labeled handoff.md to a fresh session at 0%">
  <!-- frame -->
  <rect x="1" y="1" width="958" height="458" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  <line x1="480" y1="20" x2="480" y2="404" stroke="#30363d" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- panel titles -->
  <text x="250" y="46" text-anchor="middle" fill="#8b949e" font-size="15" font-weight="700" letter-spacing="3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">WITHOUT BATONPASS</text>
  <text x="715" y="46" text-anchor="middle" fill="#8b949e" font-size="15" font-weight="700" letter-spacing="3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">WITH BATONPASS</text>

  <!-- ================= PANEL 1: overworked session ================= -->
  <!-- clock -->
  <circle cx="420" cy="104" r="24" fill="none" stroke="#8b949e" stroke-width="2.5"/>
  <line x1="420" y1="104" x2="420" y2="88" stroke="#8b949e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="420" y1="104" x2="431" y2="110" stroke="#8b949e" stroke-width="2.5" stroke-linecap="round"/>
  <text x="420" y="148" text-anchor="middle" fill="#8b949e" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">3:07 AM</text>

  <!-- speech bubble -->
  <rect x="185" y="86" width="205" height="56" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <path d="M 232 142 L 214 172 L 258 146 Z" fill="#161b22" stroke="#30363d" stroke-width="2" stroke-linejoin="round"/>
  <text x="287" y="110" text-anchor="middle" fill="#c9d1d9" font-size="13.5">wait… what were we</text>
  <text x="287" y="130" text-anchor="middle" fill="#c9d1d9" font-size="13.5">building again?</text>

  <!-- terminal-headed agent, slumped -->
  <rect x="118" y="176" width="88" height="60" rx="9" fill="#161b22" stroke="#f85149" stroke-width="3"/>
  <!-- tired eyes (drooping arcs) + wobbly mouth -->
  <path d="M 136 202 q 8 7 17 0" fill="none" stroke="#f85149" stroke-width="3" stroke-linecap="round"/>
  <path d="M 168 202 q 8 7 17 0" fill="none" stroke="#f85149" stroke-width="3" stroke-linecap="round"/>
  <path d="M 146 220 q 7 -5 14 0 q 7 5 14 0" fill="none" stroke="#f85149" stroke-width="2.5" stroke-linecap="round"/>
  <!-- sweat drops -->
  <path d="M 214 178 q 7 10 0 15 q -7 -5 0 -15" fill="#58a6ff"/>
  <path d="M 226 200 q 6 9 0 13 q -6 -4 0 -13" fill="#58a6ff"/>
  <!-- slumped body + arms typing -->
  <path d="M 163 236 q -14 42 -4 74" fill="none" stroke="#c9d1d9" stroke-width="5" stroke-linecap="round"/>
  <path d="M 160 268 q 50 14 92 26" fill="none" stroke="#c9d1d9" stroke-width="5" stroke-linecap="round"/>
  <path d="M 158 284 q 46 18 84 22" fill="none" stroke="#c9d1d9" stroke-width="5" stroke-linecap="round"/>

  <!-- laptop -->
  <rect x="252" y="244" width="126" height="84" rx="7" fill="#161b22" stroke="#30363d" stroke-width="2.5"/>
  <text x="266" y="270" fill="#8b949e" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">context</text>
  <text x="366" y="270" text-anchor="end" fill="#f85149" font-size="13" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">99%</text>
  <rect x="266" y="282" width="100" height="12" rx="6" fill="#21262d"/>
  <rect x="266" y="282" width="97" height="12" rx="6" fill="#f85149"/>
  <text x="266" y="316" fill="#d29922" font-size="10.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">⚠ compacting (again)…</text>

  <!-- desk -->
  <rect x="88" y="330" width="326" height="10" rx="4" fill="#21262d"/>
  <line x1="106" y1="340" x2="106" y2="392" stroke="#21262d" stroke-width="8" stroke-linecap="round"/>
  <line x1="396" y1="340" x2="396" y2="392" stroke="#21262d" stroke-width="8" stroke-linecap="round"/>

  <!-- coffee mugs + steam -->
  <g stroke="#8b949e" stroke-width="2" fill="#21262d">
    <rect x="110" y="312" width="15" height="17" rx="2"/>
    <rect x="134" y="312" width="15" height="17" rx="2"/>
    <rect x="158" y="312" width="15" height="17" rx="2"/>
    <path d="M 173 316 q 8 3 0 9" fill="none"/>
  </g>
  <path d="M 164 296 q 4 -5 0 -10 q -4 -5 0 -10" fill="none" stroke="#8b949e" stroke-width="1.5" opacity="0.6"/>

  <!-- ================= PANEL 2: the baton pass ================= -->
  <!-- ground -->
  <line x1="508" y1="352" x2="932" y2="352" stroke="#30363d" stroke-width="3" stroke-linecap="round"/>

  <!-- runner 1: outgoing session (tired but proud) -->
  <rect x="524" y="152" width="82" height="56" rx="9" fill="#161b22" stroke="#d29922" stroke-width="3"/>
  <path d="M 542 176 q 8 6 16 0" fill="none" stroke="#d29922" stroke-width="3" stroke-linecap="round"/>
  <path d="M 572 176 q 8 6 16 0" fill="none" stroke="#d29922" stroke-width="3" stroke-linecap="round"/>
  <path d="M 552 192 q 12 7 26 0" fill="none" stroke="#d29922" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 612 156 q 6 9 0 13 q -6 -4 0 -13" fill="#58a6ff"/>
  <rect x="532" y="118" width="66" height="20" rx="10" fill="#d29922"/>
  <text x="565" y="132" text-anchor="middle" fill="#0d1117" font-size="11" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">ctx 75%</text>
  <!-- body leaning forward, arm extending baton -->
  <path d="M 567 208 q 14 30 24 54" fill="none" stroke="#c9d1d9" stroke-width="5" stroke-linecap="round"/>
  <path d="M 575 226 q 42 4 74 8" fill="none" stroke="#c9d1d9" stroke-width="5" stroke-linecap="round"/>
  <path d="M 591 262 q -14 42 -22 62 M 591 262 q 20 34 30 56" fill="none" stroke="#c9d1d9" stroke-width="5" stroke-linecap="round"/>

  <!-- the baton -->
  <g transform="rotate(-7 690 234)">
    <rect x="650" y="222" width="80" height="22" rx="11" fill="#d29922" stroke="#9e6a03" stroke-width="2"/>
    <text x="690" y="237" text-anchor="middle" fill="#0d1117" font-size="10.5" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">handoff.md</text>
  </g>

  <!-- runner 2: fresh session (sprinting) -->
  <rect x="774" y="140" width="82" height="56" rx="9" fill="#161b22" stroke="#3fb950" stroke-width="3"/>
  <path d="M 792 172 q 8 -8 16 0" fill="none" stroke="#3fb950" stroke-width="3" stroke-linecap="round"/>
  <path d="M 822 172 q 8 -8 16 0" fill="none" stroke="#3fb950" stroke-width="3" stroke-linecap="round"/>
  <path d="M 802 182 q 12 9 26 0" fill="none" stroke="#3fb950" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="782" y="106" width="66" height="20" rx="10" fill="#3fb950"/>
  <text x="815" y="120" text-anchor="middle" fill="#0d1117" font-size="11" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">ctx 0%</text>
  <!-- body sprinting: one arm back to grab baton, one arm forward -->
  <path d="M 813 196 q -6 34 -12 58" fill="none" stroke="#c9d1d9" stroke-width="5" stroke-linecap="round"/>
  <path d="M 809 214 q -38 12 -72 16" fill="none" stroke="#c9d1d9" stroke-width="5" stroke-linecap="round"/>
  <path d="M 809 218 q 34 -12 58 -24" fill="none" stroke="#c9d1d9" stroke-width="5" stroke-linecap="round"/>
  <path d="M 801 254 q -30 30 -44 48 M 801 254 q 26 32 36 54" fill="none" stroke="#c9d1d9" stroke-width="5" stroke-linecap="round"/>
  <!-- motion lines -->
  <g stroke="#3fb950" stroke-width="3" stroke-linecap="round" opacity="0.55">
    <line x1="872" y1="208" x2="918" y2="208"/>
    <line x1="882" y1="240" x2="924" y2="240"/>
    <line x1="874" y1="272" x2="912" y2="272"/>
  </g>

  <!-- caption -->
  <text x="480" y="436" text-anchor="middle" fill="#8b949e" font-size="14" font-style="italic">the baton is a structured handoff — objective, next steps, gotchas. nothing forgotten, forever.</text>
</svg>
